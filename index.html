<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>構造材料特性データベース</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1 class="header-title" id="pageTitle">構造材料特性データベース</h1>
      <span class="header-subtitle" id="materialCount"></span>
    </div>
    <div class="header-center">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="材料名で検索...">
      </div>
    </div>
    <div class="header-right">
      <button class="toggle-btn" id="langToggle" title="Switch language" type="button">
        <span id="langLabel">EN</span>
      </button>
      <button class="toggle-btn" id="themeToggle" title="Toggle dark mode" type="button">
        <svg id="themeIconSun" class="theme-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg id="themeIconMoon" class="theme-icon hidden" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <h3 class="sidebar-heading" id="collectionHeading">コレクション</h3>
        <ul class="category-list" id="collectionList"></ul>
      </div>
      <div class="sidebar-section">
        <h3 class="sidebar-heading" id="categoryHeading">大分類</h3>
        <ul class="category-list" id="categoryList"></ul>
      </div>
      <div class="sidebar-section">
        <h3 class="sidebar-heading" id="subcategoryHeading">中分類</h3>
        <ul class="category-list" id="subcategoryList"></ul>
      </div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div class="toolbar-group">
          <label class="toolbar-label" id="sortLabel" for="sortSelect">並び替え</label>
          <select class="toolbar-select" id="sortSelect"></select>
        </div>
        <div class="toolbar-actions">
          <button class="toolbar-btn" id="copyViewLinkBtn" type="button">表示を共有</button>
          <button class="toolbar-btn" id="openCompareBtn" type="button">
            <span id="compareButtonText">比較</span>
            <span class="toolbar-count" id="compareCount">0</span>
          </button>
        </div>
      </div>
      <div class="material-list" id="materialList"></div>
      <div class="material-detail hidden" id="materialDetail"></div>
    </main>
  </div>

  <div class="compare-bar hidden" id="compareBar">
    <div class="compare-bar-meta">
      <div class="compare-bar-title" id="compareBarTitle">比較候補</div>
      <div class="compare-chip-list" id="compareChipList"></div>
    </div>
    <div class="compare-bar-actions">
      <button class="toolbar-btn" id="compareBarOpenBtn" type="button">比較表示</button>
      <button class="toolbar-btn subtle" id="compareBarClearBtn" type="button">クリア</button>
    </div>
  </div>

  <div class="overlay hidden" id="overlay"></div>
  <div class="compare-overlay hidden" id="compareOverlay"></div>
  <div class="compare-panel hidden" id="comparePanel"></div>
  <div class="toast hidden" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
