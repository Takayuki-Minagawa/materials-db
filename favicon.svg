<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8cff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Database cylinder base -->
  <ellipse cx="16" cy="24" rx="12" ry="4" fill="url(#g1)" opacity="0.9"/>
  <rect x="4" y="12" width="24" height="12" fill="url(#g1)" opacity="0.9"/>
  <ellipse cx="16" cy="12" rx="12" ry="4" fill="url(#g2)"/>
  <!-- Middle separator -->
  <ellipse cx="16" cy="18" rx="12" ry="3.5" fill="none" stroke="#fff" stroke-width="0.6" opacity="0.5"/>
  <!-- Crystal / atom nodes -->
  <circle cx="16" cy="10" r="2.2" fill="#fff" opacity="0.95"/>
  <circle cx="10" cy="15" r="1.6" fill="#fff" opacity="0.8"/>
  <circle cx="22" cy="15" r="1.6" fill="#fff" opacity="0.8"/>
  <circle cx="16" cy="20" r="1.6" fill="#fff" opacity="0.8"/>
  <!-- Bonds between atoms -->
  <line x1="16" y1="10" x2="10" y2="15" stroke="#fff" stroke-width="0.7" opacity="0.6"/>
  <line x1="16" y1="10" x2="22" y2="15" stroke="#fff" stroke-width="0.7" opacity="0.6"/>
  <line x1="10" y1="15" x2="16" y2="20" stroke="#fff" stroke-width="0.7" opacity="0.6"/>
  <line x1="22" y1="15" x2="16" y2="20" stroke="#fff" stroke-width="0.7" opacity="0.6"/>
</svg>
